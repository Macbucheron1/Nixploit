name: Image release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-tarball:
    name: Build and publish release
    runs-on: [self-hosted, Linux, X64]

    if: startsWith(github.ref, 'refs/tags/v')

    env:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
      GH_TOKEN: ${{ github.token }}
      ASSET_NAME: nixploit-default.tar.xz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tarball
        run: |
          nix build .#tarball -L --out-link result

      - name: Prepare release asset
        run: |
          mkdir -p artifacts
          cp -vL result "artifacts/${ASSET_NAME}"
          ls -lh "artifacts/${ASSET_NAME}"

      - name: Create GitHub release
        run: |
          nix shell nixpkgs#gh -c gh release create "${GITHUB_REF_NAME}" \
            "artifacts/${ASSET_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
