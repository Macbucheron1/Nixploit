config:
  raw.idmap: |-
    uid 1000 1000
    gid 1000 1000

  cloud-init.user-data: |
    #cloud-config
    write_files:
      - path: /etc/systemd/system/pentest-gui-links.service
        permissions: "0644"
        content: |
          [Unit]
          Description=Prepare GUI socket links
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'mkdir -p /run/user/1000 /tmp/.X11-unix'
          ExecStart=/bin/sh -c 'ln -sf /mnt/.config/wayland-0 /run/user/1000/wayland-0'
          ExecStart=/bin/sh -c 'ln -sf /mnt/.config/.X11-unix/X0 /tmp/.X11-unix/X0 || true'
          ExecStart=/bin/sh -c 'chown -R user:users /run/user/1000 || true'

          [Install]
          WantedBy=multi-user.target

      - path: /etc/profile.d/pentest-gui.sh
        permissions: "0644"
        content: |
          export XDG_RUNTIME_DIR=/run/user/1000
          export WAYLAND_DISPLAY=wayland-0
          export MOZ_ENABLE_WAYLAND=1
          export GDK_BACKEND=wayland
          export DISPLAY=:0
          export XAUTHORITY=/mnt/.config/.Xauthority

    runcmd:
      - systemctl enable pentest-gui-links.service
      - systemctl start pentest-gui-links.service


